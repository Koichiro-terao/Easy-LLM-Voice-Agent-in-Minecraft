name: "__PROJECT_NAME__"

services:
  mc:
    image: itzg/minecraft-server
    container_name: "__CONTAINER_NAME__"
    tty: true
    stdin_open: true
    ports:
      - "__MC_PORT__:25565"
      - "24454:24454/udp"
    environment:
      MC_SERVER_ID: "__MC_SERVER_ID__"
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "__MC_VERSION__"
      # CREATE_CONSOLE_IN_PIPE: "true"
      BN_WORLD_PROFILE_ENV_PLACEHOLDER: ""
      MODRINTH_PROJECTS: |
        fabric-api
#        spark
#        lithium
#        vmp-fabric:alpha
#        ferrite-core
      OPS: 36881d51-7477-3eb6-91a1-dfc11065590d
      ONLINE_MODE: "FALSE"
      DIFFICULTY: "peaceful"
      MAX_PLAYERS: "100"
#      SIMULATION_DISTANCE: "4"
    volumes:
      - "./data:/data"
      - "__MODS_HOST_PATH__:/mods:ro"
    networks:
      - "bnnet"

networks:
  bnnet:
    external: true
